<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}پنل مدیریت{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <svg class="tg-icon" viewBox="0 0 24 24" width="26" height="26">
                <path fill="#fff" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
                10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13
                7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58
                -1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15
                2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14
                -.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41
                -1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31
                -1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11
                5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27
                .02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
            </svg>
            <span>پنل مدیریت</span>
        </div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <span class="nav-icon">&#9776;</span> داشبورد
            </a>
            <a href="{{ url_for('logout') }}" class="nav-item">
                <span class="nav-icon">&#10140;</span> خروج
            </a>
        </nav>
        <div class="sidebar-footer">نسخه ۱.۰</div>
    </aside>

    <main class="main">
        <header class="topbar">
            <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>
            <h1 class="page-title">{% block header %}داشبورد{% endblock %}</h1>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-wrap">
            {% for cat, msg in messages %}
            <div class="flash flash-{{ cat }}">{{ msg }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <div class="content">{% block content %}{% endblock %}</div>
    </main>
</div>
</body>
</html>
